# Production: docker compose -f compose.prod.yml up -d
# First run: ./scripts/setup.sh

services:
  app:
    image: ghcr.io/andrejvysny/spendly:main
    container_name: spendly
    restart: unless-stopped
    stop_grace_period: 120s
    ports:
      - '${PORT:-80}:80'
      - '443:443'
      - '443:443/udp'
    environment:
      APP_NAME: ${APP_NAME:-Spendly}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: 'false'
      APP_URL: ${APP_URL:-http://localhost}
      APP_LOCALE: ${APP_LOCALE:-en}
      APP_FALLBACK_LOCALE: en
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      SESSION_DRIVER: database
      SESSION_LIFETIME: '120'
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      OCTANE_SERVER: frankenphp
      FILESYSTEM_DISK: local
      BROADCAST_CONNECTION: log
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@localhost}
      MAIL_FROM_NAME: ${APP_NAME:-Spendly}
      GOCARDLESS_USE_MOCK: 'false'
      GOCARDLESS_SECRET_ID: ${GOCARDLESS_SECRET_ID:-}
      GOCARDLESS_SECRET_KEY: ${GOCARDLESS_SECRET_KEY:-}
      ML_ENABLED: ${ML_ENABLED:-false}
      ML_API_URL: ${ML_API_URL:-}
      GOMEMLIMIT: '450MiB'
    volumes:
      - app_database:/app/database
      - app_storage:/app/storage
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_database:
  app_storage:
  caddy_data:
  caddy_config:
