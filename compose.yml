services:
  cli:
    image: ghcr.io/andrejvysny/php-cli:8.3
    env_file: .env
    working_dir: /var/www/html
    environment:
      - XDEBUG_MODE=coverage
      - XDEBUG_CONFIG=client_host=host.docker.internal
    volumes:
      - .:/var/www/html
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini

  node:
    container_name: node
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: node
    working_dir: /app
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
    network_mode: host
    command: sh -c "npm run dev"

  app:
    container_name: app
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: development
    volumes:
      - .:/app
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    ports:
      - '80:80'
    working_dir: /app
    env_file: .env
    environment:
      - XDEBUG_MODE=coverage
      - XDEBUG_CONFIG=client_host=host.docker.internal
      - OCTANE_SERVER=frankenphp
    command: sh -c "php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=80 --admin-port=2019 --watch"

  test:
    container_name: test
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: testing
    environment:
      - XDEBUG_MODE=coverage
      - XDEBUG_CONFIG=client_host=host.docker.internal
      - APP_ENV=testing
      - LOG_CHANNEL=null
      - DB_CONNECTION=sqlite
      - DB_DATABASE=":memory:"
      - CACHE_STORE=array
      - SESSION_DRIVER=array
      - QUEUE_CONNECTION=sync
    volumes:
      - .:/app
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    working_dir: /app
    command: sh -c "composer install && php artisan test --coverage"
